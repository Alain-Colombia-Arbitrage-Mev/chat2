# Custom gitleaks rules layered on top of the default set.
title = "ancestro-chat-frontend gitleaks config"

[extend]
useDefault = true

[[rules]]
id = "together-ai-key"
description = "Together AI API key"
regex = '''tgp_v1_[A-Za-z0-9_\-]{20,}'''
keywords = ["tgp_v1_"]

[[rules]]
id = "openai-key"
description = "OpenAI API key (broad)"
regex = '''sk-(?:proj-)?[A-Za-z0-9_\-]{20,}'''
keywords = ["sk-"]

[[rules]]
id = "anthropic-key"
description = "Anthropic API key"
regex = '''sk-ant-[A-Za-z0-9_\-]{20,}'''
keywords = ["sk-ant-"]

[allowlist]
paths = [
  '''(^|/)\.env\.example$''',
  '''(^|/)README\.md$''',
  '''(^|/)docs/''',
]
